<!-- KPIs -->
<div id="kpis" class="row g-3 mb-4"></div>

<!-- Venn + Timeline + Tabela -->
<div class="row g-3">

    <div class="col-lg-4">
        <div class="card shadow-sm h-100">
            <div class="card-body">
                <h5 class="card-title mb-1">Presença nos Municípios</h5>
                <small class="text-muted d-block mb-3">
                    4G retirado para simplificação: 100% dos municípios
                </small>
                <div id="venn-legend" class="d-flex gap-3 mb-3 flex-wrap"></div>
                <svg id="venn-svg" viewBox="0 0 500 420" style="width:100%; height:420px;"></svg>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title mb-1">Linha do Tempo</h5>
                <small class="text-muted d-block mb-3">
                    Municípios acumulados por tecnologia
                </small>
                <div id="timeline-chart" class="flex-grow-1" style="width:100%; min-height:420px;"></div>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">Municípios</h5>
                    <input id="table-search" type="text" class="form-control form-control-sm"
                           placeholder="Buscar..." style="max-width:160px;">
                </div>
                <div class="table-responsive flex-grow-1" style="max-height: 380px;">
                    <table class="table table-sm table-striped table-hover">
                        <thead class="sticky-top bg-white">
                            <tr>
                                <th class="sortable" data-col="uf">UF</th>
                                <th class="sortable" data-col="municipio">Município</th>
                                <th class="text-center sortable" data-col="presenca">TIM</th>
                                <th class="text-center sortable" data-col="presenca_5g">5G</th>
                                <th class="text-center sortable" data-col="presenca_4g">4G</th>
                                <th class="text-center sortable" data-col="presenca_3g">3G</th>
                                <th class="text-center sortable" data-col="presenca_2g">2G</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-2">
                    <small id="table-info" class="text-muted"></small>
                    <div>
                        <button id="prev-page" class="btn btn-sm btn-outline-secondary">‹</button>
                        <span id="page-indicator" class="mx-2 small"></span>
                        <button id="next-page" class="btn btn-sm btn-outline-secondary">›</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Frequências -->
<div class="row g-3 mt-1">
    <div class="col-12">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-1">Frequências Utilizadas por Tecnologia</h5>
                <small class="text-muted d-block mb-3">
                    Municípios ativos por tecnologia e faixa de frequência
                </small>
                <div id="freq-chart" style="width:100%; height:420px;"></div>
            </div>
        </div>
    </div>
</div>
