<div class="col-md-6 col-lg-4">
    <a href="{{ m.url if m.enabled else '#' }}"
       class="module-card d-block h-100 text-decoration-none {% if not m.enabled %}disabled{% endif %}"
       style="--module-color: {{ m.color }};">

        <div class="card border-0 shadow-sm h-100">
            <div class="module-card-top"></div>
            <div class="card-body p-4">

                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div class="module-icon">
                        <i class="{{ m.icon }}"></i>
                    </div>
                    {% if not m.enabled %}
                        <span class="badge bg-secondary">Em breve</span>
                    {% else %}
                        <span class="badge module-badge">Disponível</span>
                    {% endif %}
                </div>

                <h5 class="fw-bold mb-2 text-dark">{{ m.name }}</h5>
                <p class="text-muted small mb-3">{{ m.description }}</p>

                {% if m.enabled %}
                <div class="module-cta small fw-bold">
                    Abrir <i class="bi bi-arrow-right"></i>
                </div>
                {% endif %}

            </div>
        </div>
    </a>
</div>
