{% set current_path = request.path %}

<nav class="navbar navbar-expand-lg navbar-dark tim-navbar">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <i class="bi bi-broadcast me-2"></i>
            TIM Technical Planning
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav" aria-controls="mainNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item">
                    <a class="nav-link {% if current_path == '/' %}active{% endif %}" href="/">
                        <i class="bi bi-house-door me-1"></i> Home
                    </a>
                </li>

                {% for m in modules if m.enabled %}
                <li class="nav-item">
                    <a class="nav-link" href="{{ m.url }}">
                        <i class="{{ m.icon }} me-1"></i> {{ m.name }}
                    </a>
                </li>
                {% endfor %}

                <!-- Divisor sutil -->
                <li class="nav-item d-none d-lg-block">
                    <span class="mx-2 text-white-50">|</span>
                </li>

                <!-- Toggle de tema -->
                <li class="nav-item">
                    <button id="theme-toggle" type="button"
                            class="btn btn-sm btn-outline-light d-flex align-items-center gap-1"
                            title="Alternar tema claro/escuro">
                        <i id="theme-icon" class="bi bi-moon-stars-fill"></i>
                        <span id="theme-label" class="d-none d-md-inline">Escuro</span>
                    </button>
                </li>

            </ul>
        </div>

    </div>
</nav>
