<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TIM Technical Planning{% endblock %}</title>

    <!-- Aplica tema salvo ANTES do CSS renderizar (evita flash) -->
    <script>
        (function() {
            try {
                var saved = localStorage.getItem("tim-theme") || "light";
                document.documentElement.setAttribute("data-bs-theme", saved);
                document.documentElement.setAttribute("data-theme", saved);
            } catch (e) {}
        })();
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/bootstrap.min.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.min.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">

    {% block head_extras %}{% endblock %}
</head>
<body>

    {% include "_shared/navbar.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "_shared/footer.html" %}

    <script src="{{ url_for('static', filename='vendor/bootstrap/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
